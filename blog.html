<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — Spec Interior | Home Decor Tips & Inspiration</title>
  <meta name="description" content="Read our blog for home decor tips, styling ideas for cane lamps and bamboo decor, and stories from our artisan community."/>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="canonical" href="https://specinterior.com/blog.html"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream:#F5F5F0;--warm-white:#FAFAF7;--sand:#EDEAE3;--terracotta:#4A5D3E;--dark:#1A1F16;--brown:#2E3B28;--brown-light:#5A6B52;--gold:#8B9E6B;--gold-light:#A3B88A;--text-muted:#7A7E72;--border:rgba(46,59,40,0.12); }
    [data-theme="dark"] { --cream:#1C2118;--warm-white:#141812;--sand:#242A1F;--terracotta:#A3B88A;--dark:#F2F0EB;--brown:#E8E5DE;--brown-light:#C8C4BB;--gold:#C8D9A8;--text-muted:#A8A59C;--border:rgba(200,196,187,0.15); }
    body { font-family:'DM Sans',sans-serif;background:var(--warm-white);color:var(--dark);min-height:100vh; }
    nav { position:sticky;top:0;z-index:100;background:rgba(250,250,247,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:72px; }
    .nav-logo { font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--brown);text-decoration:none; }
    .nav-logo span { color:var(--terracotta); }
    [data-theme="dark"] nav { background:rgba(20,24,18,0.95); }
    [data-theme="dark"] body { background:#141812;color:#F2F0EB; }

    .blog-hero { text-align:center;padding:80px 20px 40px;background:var(--cream); }
    .blog-hero h1 { font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,52px);font-weight:400;color:var(--brown);margin-bottom:12px; }
    .blog-hero p { font-size:16px;color:var(--text-muted);max-width:500px;margin:0 auto; }

    .blog-grid { max-width:1100px;margin:0 auto;padding:60px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:32px; }

    .blog-card { background:var(--cream);border-radius:16px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;text-decoration:none;color:inherit;display:block; }
    .blog-card:hover { transform:translateY(-6px);box-shadow:0 16px 48px rgba(46,59,40,0.1); }
    .blog-card-img { aspect-ratio:16/10;background:var(--sand);overflow:hidden; }
    .blog-card-img img { width:100%;height:100%;object-fit:cover; }
    .blog-card-body { padding:24px; }
    .blog-card-tag { font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--terracotta);font-weight:500;margin-bottom:10px; }
    .blog-card-title { font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--brown);line-height:1.3;margin-bottom:10px; }
    .blog-card-excerpt { font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:16px; }
    .blog-card-meta { font-size:12px;color:var(--text-muted); }

    .blog-empty { text-align:center;padding:80px 20px;color:var(--text-muted); }
    .blog-empty h2 { font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--brown);margin-bottom:12px; }

    .mini-footer { background:var(--brown);color:rgba(255,255,255,0.6);text-align:center;padding:32px;font-size:13px; }
    .mini-footer a { color:var(--gold-light);text-decoration:none; }
    @media(max-width:600px) { nav{padding:0 16px;height:56px;} .nav-logo{font-size:20px;} .blog-grid{padding:32px 16px;gap:20px;} }
  </style>
</head>
<body>
<script>(function(){var s=localStorage.getItem('specTheme');var d=window.matchMedia('(prefers-color-scheme: dark)').matches;if(s==='dark'||(!s&&d))document.documentElement.setAttribute('data-theme','dark');})();</script>

<nav><a href="index.html" class="nav-logo"><img src="logo.png" alt="Logo" style="height:26px;vertical-align:middle;margin-right:6px;"/>Spec <span>Interior</span></a></nav>

<div class="blog-hero">
  <h1>The Spec Journal</h1>
  <p>Home decor inspiration, styling tips, and stories from our artisan community</p>
</div>

<div class="blog-grid" id="blogGrid">
  <!-- Blog posts loaded from Firestore -->
</div>

<div class="blog-empty" id="blogEmpty" style="display:none;">
  <h2>Coming Soon</h2>
  <p>We're working on beautiful content for you. Check back soon!</p>
  <a href="index.html" style="display:inline-block;margin-top:20px;padding:14px 32px;background:var(--terracotta);color:white;border-radius:50px;text-decoration:none;font-weight:500;">← Back to Shop</a>
</div>

<div class="mini-footer">
  <p>&copy; 2025 Spec Interior. | <a href="index.html">Home</a> | <a href="category.html">Shop</a> | <a href="contact.html">Contact</a></p>
</div>

<script type="module">
import { db, collection, getDocs, query, orderBy } from './js/firebase-config.js';

async function loadBlog() {
  try {
    const q = query(collection(db, 'blog'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);

    if (snap.empty) {
      document.getElementById('blogEmpty').style.display = 'block';
      // Show sample posts as placeholder
      document.getElementById('blogGrid').innerHTML = `
        <div class="blog-card">
          <div class="blog-card-img" style="background:linear-gradient(135deg,#4A5D3E,#2E3B28);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:48px;">🌿</div>
          <div class="blog-card-body">
            <div class="blog-card-tag">Styling Tips</div>
            <div class="blog-card-title">10 Ways to Style Cane Lamps in Your Living Room</div>
            <div class="blog-card-excerpt">Transform your space with these creative placement ideas for natural cane pendant lamps and table lamps.</div>
            <div class="blog-card-meta">Coming Soon</div>
          </div>
        </div>
        <div class="blog-card">
          <div class="blog-card-img" style="background:linear-gradient(135deg,#8B5E3C,#C4714A);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:48px;">🎋</div>
          <div class="blog-card-body">
            <div class="blog-card-tag">Sustainability</div>
            <div class="blog-card-title">Why Bamboo Lamps Are the Eco-Friendly Choice</div>
            <div class="blog-card-excerpt">Discover the environmental benefits of choosing handcrafted bamboo and cane lighting over mass-produced alternatives.</div>
            <div class="blog-card-meta">Coming Soon</div>
          </div>
        </div>
        <div class="blog-card">
          <div class="blog-card-img" style="background:linear-gradient(135deg,#C4927A,#6B4C38);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:48px;">🏠</div>
          <div class="blog-card-body">
            <div class="blog-card-tag">Artisan Stories</div>
            <div class="blog-card-title">Meet the Craftsmen Behind Your Lamp</div>
            <div class="blog-card-excerpt">A glimpse into the lives and workshops of the artisans who weave each Spec Interior piece by hand.</div>
            <div class="blog-card-meta">Coming Soon</div>
          </div>
        </div>
      `;
      return;
    }

    const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('blogGrid').innerHTML = posts.map(p => `
      <a href="blog-post.html?id=${p.id}" class="blog-card">
        <div class="blog-card-img">${p.image ? `<img src="${p.image}" alt="${p.title}"/>` : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#4A5D3E,#2E3B28);"></div>`}</div>
        <div class="blog-card-body">
          <div class="blog-card-tag">${p.tag || 'Article'}</div>
          <div class="blog-card-title">${p.title}</div>
          <div class="blog-card-excerpt">${p.excerpt || ''}</div>
          <div class="blog-card-meta">${new Date(p.createdAt).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</div>
        </div>
      </a>
    `).join('');
  } catch (e) {
    document.getElementById('blogEmpty').style.display = 'block';
  }
}

loadBlog();
</script>
<script src="js/footer.js"></script>
<script src="js/ambient.js"></script>
</body>
</html>
