    .nav-links { display: flex; gap: 36px; list-style: none; }

    .rec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .rec-card { background: white; border-radius: 14px; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s; text-decoration: none; color: inherit; display: block; }
    .rec-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(46,59,40,0.12); }

    .rec-card:hover .rec-img img { transform: scale(1.06); }
    .rec-card .rec-info { padding: 16px; }
    .rec-card .rec-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; color: var(--brown); margin-bottom: 6px; }
    .rec-card .rec-price { font-size: 15px; font-weight: 600; color: var(--brown); }

    /* FOOTER */
    .mini-footer { background: var(--brown); color: rgba(255,255,255,0.6); text-align: center; padding: 32px; font-size: 13px; }
    .mini-footer a { color: var(--terracotta-light); text-decoration: none; }

    /* LOADING */
    .loading { text-align: center; padding: 100px 20px; color: var(--text-muted); font-size: 16px; }

    /* RESPONSIVE */
    @media (max-width: 1100px) {
      .rec-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 860px) {
      nav { padding: 0 16px; height: 56px; }
      .nav-links { display: none; }
      .nav-logo { font-size: 20px; }
      .cart-btn { padding: 8px 16px; font-size: 12px; }
      .breadcrumb { padding: 16px 16px; font-size: 12px; }
      .product-detail { grid-template-columns: 1fr; gap: 24px; padding: 0 16px 40px; }
      .product-image { aspect-ratio: 1; border-radius: 14px; }
      .product-meta h1 { font-size: 28px; }
      .product-meta .stars { font-size: 15px; }
      .price-section .current-price { font-size: 26px; }
      .price-section .original-price { font-size: 15px; }
      .product-description { font-size: 14px; }
      .action-buttons { flex-direction: column; }
      .btn-add-cart, .btn-buy-now { padding: 14px 24px; font-size: 14px; }
      .trust-badges { gap: 12px; }
      .recommended { padding: 40px 16px; }
      .recommended .section-title { font-size: 28px; }
      #reviewsSection { padding: 40px 16px !important; }
      #reviewForm { padding: 20px 16px !important; }
      .rec-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .rec-card .rec-info { padding: 12px; }
      .rec-card .rec-name { font-size: 14px; }
      .rec-card .rec-price { font-size: 14px; }
    }
    @media (max-width: 480px) {
      .product-meta h1 { font-size: 24px; }
      .price-section .current-price { font-size: 22px; }
      .qty-row { flex-direction: column; align-items: flex-start; }
    }

    [data-theme="dark"] nav { background: rgba(20,24,18,0.95); }
    [data-theme="dark"] .nav-logo { color: #F2F0EB; }
    [data-theme="dark"] .nav-logo span { color: #A3B88A; }
    [data-theme="dark"] .nav-links a { color: #C8C4BB; }

    [data-theme="dark"] .breadcrumb a { color: #C8C4BB; }
    [data-theme="dark"] .product-card { background: #1C2118; }
  </style>

<script type="module">
import { onProductsChange } from './js/products.js';
import { addToCart, updateCartBadge } from './js/cart.js';
import { addToWishlist, removeFromWishlist, isInWishlist } from './js/wishlist.js';

// Lightbox functions
window.openLightbox = function() {
  const img = document.querySelector('.product-image img');
  if (img) {
    document.getElementById('lightboxImg').src = img.src;
    document.getElementById('imageLightbox').style.display = 'flex';
  }
};
window.closeLightbox = function() {
  document.getElementById('imageLightbox').style.display = 'none';
};

const params = new URLSearchParams(window.location.search);
const productId = params.get('id');

if (!productId) {
  document.getElementById('productDetail').innerHTML = '<div class="loading">Product not found. <a href="index.html">Go back home</a></div>';
}

const categoryLabels = { lamp: 'Cane Lamp', wall: 'Wall Decor', standing: 'Standing Lamp', gifting: 'Gift Set', basket: 'Basket', pendant: 'Pendant' };
const categoryDescriptions = {
  lamp: 'Handcrafted from natural cane and bamboo, this lamp casts beautiful shadow patterns and fills your space with warm, ambient light. Perfect for living rooms, bedrooms, or cozy reading corners.',
  wall: 'A stunning piece of artisan wall decor that adds texture, depth, and character to any room. Handmade using traditional techniques passed down through generations.',
  standing: 'An elegant floor-standing lamp that serves as both functional lighting and a sculptural statement piece. Designed to anchor any room with its presence.',
  gifting: 'A thoughtfully curated gift set, beautifully packaged for housewarmings, weddings, and celebrations. Premium wrapping included for a special unboxing experience.',
  basket: 'A versatile handwoven basket crafted from natural fibers. Perfect for storage, as a planter, or as a standalone decor piece in any corner of your home.'
};
const categoryFeatures = {
  lamp: ['Hand-woven natural cane', 'Warm LED bulb compatible', 'Creates intricate shadow patterns', 'Suitable for indoor use', 'Easy to install'],
  wall: ['100% handmade in India', 'Ready to hang (hardware included)', 'Natural & sustainable materials', 'Unique artisan craftsmanship', 'Lightweight & durable'],
  standing: ['5ft+ height', 'Dimmable bulb compatible', 'Solid wood base', 'Living room & bedroom ready', 'Minimal assembly required'],
  gifting: ['Premium gift wrapping', 'Personal message card included', 'Same-day dispatch available', 'Eco-friendly packaging', 'Perfect for all occasions'],
  basket: ['100% natural jute/seagrass', 'Multi-purpose use', 'Handwoven by artisans', 'Eco-friendly & sustainable', 'Sturdy construction']
};

let allProducts = [];
let qty = 1;

onProductsChange((products) => {
  allProducts = products;
  const product = products.find(p => p.id === productId);
  if (!product) {
    document.getElementById('productDetail').innerHTML = '<div class="loading">Product not found. <a href="index.html">Go back home</a></div>';
    return;
  }
  renderProduct(product);
  renderRecommended(product);
  renderRecentlyViewed();
});

function renderProduct(p) {
  const cat = p.category || 'lamp';
  const catLabel = categoryLabels[cat] || cat;
  const discount = p.originalPrice ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
  const stars = '★'.repeat(Math.round(p.rating || 5)) + '☆'.repeat(5 - Math.round(p.rating || 5));
  const imgStyle = p.image
    ? `<img src="${p.image}" alt="${p.name}"/>`
    : `<div style="width:100%;height:100%;background:linear-gradient(145deg, ${p.color1||'#8B5E3C'}, ${p.color2||'#4A5D3E'});display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 200 200" width="140" opacity="0.3" xmlns="http://www.w3.org/2000/svg"><ellipse cx="100" cy="50" rx="40" ry="12" fill="#F5F5F0"/><polygon points="60,50 140,50 160,160 40,160" fill="#F5F5F0" opacity="0.7"/><ellipse cx="100" cy="160" rx="60" ry="14" fill="#F5F5F0" opacity="0.4"/></svg></div>`;
  const description = p.description || categoryDescriptions[cat] || 'A beautifully handcrafted piece from Spec Interior.';
  const features = (p.highlights && p.highlights.length > 0) ? p.highlights : (categoryFeatures[cat] || categoryFeatures.lamp);

  document.title = `${p.name} — Spec Interior`;
  document.getElementById('breadCat').innerHTML = `<a href="category.html?cat=${cat}">${catLabel}</a>`;
  document.getElementById('breadName').textContent = p.name;

  document.getElementById('productDetail').innerHTML = `
    <div style="position:relative;">
      <div class="product-image" id="mainImage" style="${!p.image ? 'background:linear-gradient(145deg,'+( p.color1||'#8B5E3C')+','+(p.color2||'#4A5D3E')+')' : ''};cursor:pointer;" onclick="openLightbox()">
        ${imgStyle}
      </div>
      <!-- Share buttons on image -->

            origEl.style.display = 'none'; 
            const discBadge = document.querySelector('.discount-badge');
            if (discBadge) discBadge.style.display = 'none';
          }
        }
      });
    });
  }

  // Add to cart
  document.getElementById('addToCartBtn').addEventListener('click', () => {
    const cartName = selectedSize ? `${p.name} (${selectedSize})` : p.name;
    addToCart({ id: selectedSize ? p.id + '-' + selectedSize.replace(/\s+/g,'') : p.id, name: cartName, price: selectedPrice, image: p.image || '', color1: p.color1, color2: p.color2 }, qty);
    const btn = document.getElementById('addToCartBtn');
    btn.textContent = '✓ Added!';
    btn.style.background = 'var(--gold)';
    setTimeout(() => { btn.textContent = 'Add to Cart'; btn.style.background = 'var(--terracotta)'; }, 1500);
  });

  // Buy now
  document.getElementById('buyNowBtn').addEventListener('click', () => {
    const cartName = selectedSize ? `${p.name} (${selectedSize})` : p.name;
    addToCart({ id: selectedSize ? p.id + '-' + selectedSize.replace(/\s+/g,'') : p.id, name: cartName, price: selectedPrice, image: p.image || '', color1: p.color1, color2: p.color2 }, qty);
    window.location.href = 'checkout.html';
  });

  // Wishlist toggle
  document.getElementById('wishlistBtn').addEventListener('click', () => {
    const svg = document.getElementById('wishlistBtn').querySelector('svg');
    if (isInWishlist(p.id)) {
      removeFromWishlist(p.id);
      svg.setAttribute('fill', 'none');
    } else {
      addToWishlist({ id: p.id, name: p.name, price: p.price, originalPrice: p.originalPrice, image: p.image || '', color1: p.color1, color2: p.color2, category: p.category });
      svg.setAttribute('fill', 'var(--terracotta)');
    }
  });

  // Back-in-stock notification
  const notifyBtn = document.getElementById('notifyBtn');
  if (notifyBtn) {
    notifyBtn.addEventListener('click', async () => {
      const email = document.getElementById('notifyEmail').value.trim();
      const msg = document.getElementById('notifyMsg');
      if (!email || !email.includes('@')) { msg.textContent = 'Please enter a valid email'; msg.style.color = 'var(--red)'; return; }
      try {
        await addDoc(collection(db, 'notifications'), { productId: p.id, productName: p.name, email, type: 'back-in-stock', createdAt: new Date().toISOString() });
        msg.textContent = '✓ We\'ll notify you when this is back in stock!'; msg.style.color = 'var(--green)';
        notifyBtn.disabled = true; notifyBtn.textContent = 'Subscribed';
      } catch (e) { msg.textContent = 'Failed. Please try again.'; msg.style.color = 'var(--red)'; }
    });
  }

  // Share
  const shareUrl = window.location.href;
  const shareText = `Check out ${p.name} at Spec Interior — ₹${p.price.toLocaleString()}`;
  document.getElementById('shareWhatsApp').href = `https://wa.me/?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
  document.getElementById('shareMessage').href = `sms:?body=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
  document.getElementById('shareTelegram').href = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
  document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;
  document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
  document.getElementById('shareReddit').href = `https://www.reddit.com/submit?url=${encodeURIComponent(shareUrl)}&title=${encodeURIComponent(shareText)}`;

  // Share button toggle dropdown
  document.getElementById('shareBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const dropdown = document.getElementById('shareDropdown');
    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', () => {
    document.getElementById('shareDropdown').style.display = 'none';
  });

  // Copy link
  document.getElementById('shareCopy').addEventListener('click', () => {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const btn = document.getElementById('shareCopy');
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3CB371" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg> Copied!';
      setTimeout(() => { btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Link'; }, 2000);
    });
  });

  // Pincode check
  document.getElementById('pincodeCheck').addEventListener('click', () => {
    const pin = document.getElementById('pincodeInput').value.trim();
    const result = document.getElementById('pincodeResult');
    if (!pin || pin.length !== 6 || !/^\d+$/.test(pin)) {
      result.textContent = '❌ Please enter a valid 6-digit pincode';
      result.style.color = 'var(--red)';
      return;
    }
    // All India delivery
    result.textContent = '✓ Delivery available! Estimated 7–10 business days';
    result.style.color = 'var(--green)';
  });
  document.getElementById('pincodeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('pincodeCheck').click();
  });

  // Save to recently viewed
  saveRecentlyViewed(p);
}

// Recently viewed
function saveRecentlyViewed(product) {
  const key = 'specRecentlyViewed';
  let recent = JSON.parse(localStorage.getItem(key) || '[]');
  // Remove if already exists
  recent = recent.filter(r => r.id !== product.id);
  // Add to front
  recent.unshift({ id: product.id, name: product.name, price: product.price, image: product.image || '', color1: product.color1, color2: product.color2 });
  // Keep only 8
  recent = recent.slice(0, 8);
  localStorage.setItem(key, JSON.stringify(recent));
}

function renderRecentlyViewed() {
  const key = 'specRecentlyViewed';
  const recent = JSON.parse(localStorage.getItem(key) || '[]');
  const currentId = new URLSearchParams(window.location.search).get('id');
  const filtered = recent.filter(r => r.id !== currentId);
  if (filtered.length === 0) return;

  const section = document.createElement('section');
  section.className = 'recommended';
  section.style.background = 'var(--warm-white)';
  section.innerHTML = `
    <div class="section-header">
      <div class="section-eyebrow">Recently Viewed</div>
      <h2 class="section-title">Continue <em>browsing</em></h2>
    </div>
    <div class="rec-grid">${filtered.slice(0, 4).map(p => {
      const imgHtml = p.image
        ? `<img src="${p.image}" alt="${p.name}"/>`
        : `<div style="width:100%;height:100%;background:linear-gradient(145deg,${p.color1||'#8B5E3C'},${p.color2||'#4A5D3E'});"></div>`;
      return `<a href="product.html?id=${p.id}" class="rec-card">
        <div class="rec-img">${imgHtml}</div>
        <div class="rec-info"><div class="rec-name">${p.name}</div><div class="rec-price">₹${p.price.toLocaleString()}</div></div>
      </a>`;
    }).join('')}</div>
  `;
  // Insert before footer
  const footer = document.querySelector('.mini-footer');
  if (footer) footer.parentNode.insertBefore(section, footer);
}

// ─── REVIEWS ────────────────────────────────────────
let selectedRating = 5;

async function loadReviews() {
  try {
    const q = query(collection(db, 'reviews'), where('productId', '==', productId), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    const reviews = snap.docs.map(d => d.data());
    const listEl = document.getElementById('reviewsList');

    if (reviews.length === 0) {
      listEl.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">No reviews yet. Be the first to review this product!</p>';
      return;
    }

    listEl.innerHTML = reviews.map(r => `
      <div style="padding:16px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="width:36px;height:36px;background:var(--terracotta);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:500;">${(r.name||'A')[0].toUpperCase()}</div>
          <div>
            <div style="font-size:14px;font-weight:500;color:var(--brown);">${r.name || 'Anonymous'}</div>
            <div style="font-size:12px;color:var(--text-muted);">${new Date(r.createdAt).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</div>
          </div>
          <div style="margin-left:auto;color:var(--gold);font-size:14px;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        </div>
        <p style="font-size:14px;color:var(--text-muted);line-height:1.6;">${r.text || ''}</p>
      </div>
    `).join('');
  } catch (e) {
    console.warn('Reviews load failed:', e);
  }
}

function initReviewForm() {
  // Star picker
  document.querySelectorAll('#starPicker span').forEach(star => {
    star.addEventListener('click', () => {
      selectedRating = parseInt(star.dataset.star);
      document.querySelectorAll('#starPicker span').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
      });
    });
    star.addEventListener('mouseover', () => {
      const val = parseInt(star.dataset.star);
      document.querySelectorAll('#starPicker span').forEach((s, i) => {
        s.textContent = i < val ? '★' : '☆';
      });
    });
    star.addEventListener('mouseout', () => {
      document.querySelectorAll('#starPicker span').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
      });
    });
  });
  // Set default 5 stars
  document.querySelectorAll('#starPicker span').forEach(s => s.textContent = '★');

  // Submit
  document.getElementById('submitReview').addEventListener('click', async () => {
    const name = document.getElementById('reviewName').value.trim();
    const text = document.getElementById('reviewText').value.trim();
    const msgEl = document.getElementById('reviewMsg');

    if (!name || !text) {
      msgEl.textContent = 'Please fill in your name and review';
      msgEl.style.color = 'var(--red)';
      return;
    }

    document.getElementById('submitReview').disabled = true;
    document.getElementById('submitReview').textContent = 'Submitting...';

    try {
      await addDoc(collection(db, 'reviews'), {
        productId,
        name,
        rating: selectedRating,
        text,
        createdAt: new Date().toISOString()
      });
      msgEl.textContent = '✓ Review submitted! Thank you.';
      msgEl.style.color = 'var(--green)';
      document.getElementById('reviewName').value = '';
      document.getElementById('reviewText').value = '';
      loadReviews();
    } catch (e) {
      msgEl.textContent = 'Failed to submit. Please try again.';
      msgEl.style.color = 'var(--red)';
    }
    document.getElementById('submitReview').disabled = false;
    document.getElementById('submitReview').textContent = 'Submit Review';
  });
}

// Load reviews after product loads
if (productId) {
  loadReviews();
  initReviewForm();
}

function renderRecommended(currentProduct) {
  // Get products from same category, excluding current
  let similar = allProducts.filter(p => p.category === currentProduct.category && p.id !== currentProduct.id);
  // If not enough, add from other categories
  if (similar.length < 4) {
    const others = allProducts.filter(p => p.id !== currentProduct.id && p.category !== currentProduct.category);
    similar = [...similar, ...others].slice(0, 8);
  } else {
    similar = similar.slice(0, 8);
  }

  if (similar.length === 0) {
    document.getElementById('recommendedSection').style.display = 'none';
    return;
  }

  document.getElementById('recommendedSection').style.display = 'block';
  document.getElementById('recGrid').innerHTML = similar.map(p => {
    const imgHtml = p.image
      ? `<img src="${p.image}" alt="${p.name}"/>`
      : `<div style="width:100%;height:100%;background:linear-gradient(145deg,${p.color1||'#8B5E3C'},${p.color2||'#4A5D3E'});"></div>`;
    return `
      <a href="product.html?id=${p.id}" class="rec-card">
        <div class="rec-img">${imgHtml}</div>
        <div class="rec-info">
          <div class="rec-name">${p.name}</div>
          <div class="rec-price">₹${p.price.toLocaleString()}</div>
        </div>
      </a>
    `;
  }).join('');
}
